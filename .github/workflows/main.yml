name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Qt
      uses: jurplel/setup-qt-action@v3
      with:
        version: '6.5.0'
        tools: 'mingw'
    
    - name: Build
      run: |
        cd BatteryAnalyzer
        qmake BatteryAnalyzer.pro -o Makefile
        mingw32-make -j4
        ls release/
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: BatteryAnalyzer-Windows
        path: BatteryAnalyzer/release/*.exe
        retention-days: 5
